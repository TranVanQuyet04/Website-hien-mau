name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: FE
        run: npm install

      - name: Run tests (allow no tests)
        working-directory: FE
        run: npm run test -- --passWithNoTests

      - name: Build project
        working-directory: FE
        run: npm run build